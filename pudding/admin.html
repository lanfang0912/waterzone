<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>white dessert 後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  const EMAILJS_PUBLIC_KEY       = 'EJcHADtYD8o4NPA3T';
  const EMAILJS_SERVICE_ID       = 'service_iig5un9';
  const EMAILJS_TEMPLATE_SHIP    = 'template_j3nl8y3'; // 出貨通知
  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
</script>
<style>
:root{--ink:#1a1208;--ink-mid:#4a3820;--ink-soft:#8a7060;--paper:#faf7f2;--paper-warm:#f5f0e8;--paper-dark:#ede5d5;--caramel:#c4832a;--matcha:#5a7a48;--cocoa:#6b3e26;--rule:#d8ccb8;--red:#b83232;--blue:#2a5c8a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);font-family:'Noto Serif TC',serif;color:var(--ink);min-height:100vh;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper-warm);}
.login-box{background:var(--paper);border:1px solid var(--rule);border-radius:4px;padding:40px 48px;text-align:center;width:340px;}
.login-title{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--ink-soft);margin-bottom:28px;letter-spacing:1px;}
.login-input{width:100%;padding:11px 14px;border:1px solid var(--rule);border-radius:2px;font-family:'Noto Serif TC',serif;font-size:14px;outline:none;margin-bottom:14px;background:var(--paper-warm);letter-spacing:3px;}
.login-input:focus{border-color:var(--caramel);}
.login-btn{width:100%;padding:13px;background:var(--ink);color:var(--paper);border:none;border-radius:2px;font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:3px;cursor:pointer;transition:background .2s;}
.login-btn:hover{background:var(--caramel);}
.login-err{color:var(--red);font-size:12px;margin-top:8px;}
#main-screen{display:none;}
.topbar{background:var(--ink);color:var(--paper);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.topbar-brand{font-family:'DM Serif Display',serif;font-size:18px;}
.topbar-brand span{color:var(--caramel);font-style:italic;}
.topbar-right{display:flex;align-items:center;gap:16px;font-size:12px;color:rgba(255,255,255,.6);}
.logout-btn{padding:6px 14px;border:1px solid rgba(255,255,255,.2);border-radius:2px;background:transparent;color:rgba(255,255,255,.7);cursor:pointer;font-size:11px;letter-spacing:1px;transition:all .2s;}
.logout-btn:hover{border-color:white;color:white;}
.stats-bar{background:var(--paper-dark);border-bottom:1px solid var(--rule);padding:14px 28px;display:flex;gap:28px;flex-wrap:wrap;}
.stat-item{display:flex;flex-direction:column;gap:2px;}
.stat-value{font-family:'DM Serif Display',serif;font-size:22px;}
.stat-label{font-size:10px;letter-spacing:2px;color:var(--ink-soft);text-transform:uppercase;}
.tabs{display:flex;border-bottom:2px solid var(--rule);background:var(--paper-warm);padding:0 28px;}
.tab-btn{padding:12px 22px;font-family:'Noto Serif TC',serif;font-size:12px;letter-spacing:1.5px;background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;color:var(--ink-soft);transition:all .2s;}
.tab-btn.active{color:var(--caramel);border-bottom-color:var(--caramel);}
.tab-btn:hover{color:var(--ink);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.filters{padding:14px 28px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--rule);background:var(--paper-warm);}
.filter-select,.filter-input{padding:7px 11px;border:1px solid var(--rule);border-radius:2px;background:var(--paper);font-family:'Noto Serif TC',serif;font-size:12px;color:var(--ink);outline:none;}
.filter-select:focus,.filter-input:focus{border-color:var(--caramel);}
.filter-label{font-size:11px;letter-spacing:1px;color:var(--ink-soft);}
.table-wrap{padding:18px 28px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px;}
thead tr{background:var(--paper-dark);}
th{padding:9px 11px;text-align:left;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--rule);white-space:nowrap;}
td{padding:9px 11px;border-bottom:1px solid var(--rule);vertical-align:top;color:var(--ink-mid);}
tr:hover td{background:rgba(196,131,42,.04);}
tr.done-row td{opacity:.45;}
.badge{display:inline-block;padding:3px 8px;border-radius:2px;font-size:10px;letter-spacing:1px;font-weight:500;white-space:nowrap;}
.badge-pending{background:rgba(184,50,50,.1);color:var(--red);}
.badge-paid{background:rgba(90,122,72,.12);color:var(--matcha);}
.badge-shipped{background:rgba(42,92,138,.12);color:var(--blue);}
.badge-delivery{background:rgba(107,62,38,.1);color:var(--cocoa);}
.badge-pickup{background:rgba(90,122,72,.1);color:var(--matcha);}
.flavor-tag{display:inline-block;padding:2px 6px;border-radius:2px;font-size:10px;margin:1px;}
.tag-original{background:rgba(196,131,42,.1);color:var(--caramel);}
.tag-cocoa{background:rgba(107,62,38,.1);color:var(--cocoa);}
.tag-matcha{background:rgba(90,122,72,.1);color:var(--matcha);}
.action-btns{display:flex;gap:4px;flex-wrap:wrap;}
.act-btn{padding:4px 9px;border:1px solid var(--rule);border-radius:2px;background:transparent;font-size:10px;cursor:pointer;letter-spacing:.5px;transition:all .2s;white-space:nowrap;font-family:'Noto Serif TC',serif;}
.act-btn.paid{border-color:var(--matcha);color:var(--matcha);}
.act-btn.paid:hover{background:var(--matcha);color:white;}
.act-btn.ship{border-color:var(--blue);color:var(--blue);}
.act-btn.ship:hover{background:var(--blue);color:white;}
.act-btn.edit{border-color:var(--caramel);color:var(--caramel);}
.act-btn.edit:hover{background:var(--caramel);color:white;}
.act-btn.reset{border-color:var(--rule);color:var(--ink-soft);}
.act-btn.reset:hover{border-color:var(--red);color:var(--red);}
.act-btn.del{border-color:transparent;color:#ccc;}
.act-btn.del:hover{border-color:var(--red);color:var(--red);background:rgba(180,60,60,.07);}
/* daily */
.day-section{padding:20px 28px 0;}
.day-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--rule);}
.day-title{font-family:'DM Serif Display',serif;font-size:20px;}
.day-meta{font-size:11px;color:var(--ink-soft);letter-spacing:1px;}
.day-prog{flex:1;height:5px;background:var(--paper-dark);border-radius:3px;overflow:hidden;min-width:60px;max-width:140px;}
.day-prog-bar{height:100%;background:var(--blue);border-radius:3px;transition:width .4s;}
.shipping-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:28px;}
.s-card{background:var(--paper);border:1px solid var(--rule);border-radius:4px;padding:15px;transition:box-shadow .2s;}
.s-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07);}
.s-card.done{opacity:.48;background:var(--paper-warm);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-name{font-size:14px;font-weight:500;}
.card-meta{font-size:10px;color:var(--ink-soft);margin-top:2px;}
.card-addr{font-size:11px;color:var(--ink-soft);margin:6px 0;line-height:1.5;}
.card-warn{font-size:11px;color:var(--red);margin-top:4px;}
.card-actions{display:flex;gap:6px;margin-top:10px;}
.ship-btn{flex:1;padding:8px;background:var(--blue);color:white;border:none;border-radius:2px;font-size:11px;letter-spacing:1px;cursor:pointer;font-family:'Noto Serif TC',serif;transition:background .2s;}
.ship-btn:hover{background:#1e4670;}
.ship-btn.done{background:var(--paper-dark);color:var(--ink-soft);cursor:default;}
/* schedule */
.schedule-wrap{padding:20px 28px;}
.sch-day{margin-bottom:20px;border:1px solid var(--rule);border-radius:4px;overflow:hidden;}
.sch-hdr{background:var(--paper-dark);padding:12px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.sch-title{font-family:'DM Serif Display',serif;font-size:17px;}
.stag{display:inline-block;padding:2px 8px;border-radius:2px;font-size:10px;letter-spacing:1px;}
.stag-make{background:rgba(196,131,42,.15);color:var(--caramel);}
.stag-ship{background:rgba(42,92,138,.12);color:var(--blue);}
.stag-meet{background:rgba(90,122,72,.12);color:var(--matcha);}
.sch-body{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.sch-body h4{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;}
.sch-list{list-style:none;}
.sch-list li{font-size:12px;padding:5px 0;border-bottom:1px solid var(--paper-dark);display:flex;align-items:flex-start;gap:6px;}
.sch-list li:last-child{border:none;}
.pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;white-space:nowrap;}
.pill-meet{background:rgba(90,122,72,.12);color:var(--matcha);}
.pill-ship{background:rgba(42,92,138,.1);color:var(--blue);}
.prod-row{display:flex;gap:8px;align-items:center;font-size:12px;margin-bottom:5px;}
.prod-label{color:var(--ink-soft);width:48px;}
.prod-bar{flex:1;height:13px;background:var(--paper-dark);border-radius:2px;overflow:hidden;}
.prod-fill{height:100%;border-radius:2px;}
.pf-orig{background:var(--caramel);}
.pf-matcha{background:var(--matcha);}
.pf-cocoa{background:var(--cocoa);}
.prod-num{width:38px;text-align:right;color:var(--ink-mid);}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--paper);border-radius:4px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);}
.modal-hdr{padding:20px 24px 14px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);padding:4px 8px;line-height:1;}
.modal-body{padding:20px 24px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-row.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);}
.form-ctrl{padding:8px 10px;border:1px solid var(--rule);border-radius:2px;font-family:'Noto Serif TC',serif;font-size:13px;color:var(--ink);outline:none;background:var(--paper-warm);}
.form-ctrl:focus{border-color:var(--caramel);}
.flavor-inputs{display:flex;gap:10px;}
.fi-group{flex:1;display:flex;flex-direction:column;gap:4px;}
.modal-footer{padding:14px 24px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--rule);margin-top:4px;}
.btn-save{padding:10px 24px;background:var(--caramel);color:white;border:none;border-radius:2px;font-family:'Noto Serif TC',serif;font-size:12px;letter-spacing:1px;cursor:pointer;}
.btn-save:hover{background:#a8701f;}
.btn-cancel{padding:10px 20px;background:transparent;border:1px solid var(--rule);border-radius:2px;font-family:'Noto Serif TC',serif;font-size:12px;cursor:pointer;color:var(--ink-soft);}
.btn-cancel:hover{border-color:var(--ink);color:var(--ink);}
.no-results{text-align:center;padding:48px;color:var(--ink-soft);font-size:14px;}
.note-cell{max-width:150px;font-size:11px;color:var(--ink-soft);word-break:break-all;}
.addr-cell{max-width:165px;font-size:11px;word-break:break-all;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--matcha);color:white;padding:10px 22px;border-radius:2px;font-size:12px;letter-spacing:1px;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">white <span style="color:var(--caramel);font-style:italic">dessert</span></div>
    <div class="login-sub">後台管理系統</div>
    <input class="login-input" id="pw-input" type="password" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">進入後台</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="main-screen">
  <div class="topbar">
    <div class="topbar-brand">white <span>dessert</span> 後台</div>
    <div class="topbar-right"><span id="topbar-date"></span><button class="act-btn" onclick="openNew()" style="border-color:var(--caramel);color:var(--caramel);padding:6px 14px;font-size:11px;">＋ 新增訂單</button><button class="logout-btn" onclick="logout()">登出</button></div>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('orders',this)">📋 訂單總覽</button>
    <button class="tab-btn" onclick="switchTab('daily',this)">🚚 每日出貨清單</button>
    <button class="tab-btn" onclick="switchTab('schedule',this)">🏭 生產排程</button>
    <button class="tab-btn" onclick="switchTab('inventory',this)">⚙️ 庫存設定</button>
  </div>

  <!-- TAB 1 訂單 -->
  <div class="tab-panel active" id="tab-orders">
    <div class="filters">
      <span class="filter-label">篩選：</span>
      <select class="filter-select" id="f-status" onchange="renderTable()">
        <option value="">全部狀態</option>
        <option value="pending">待確認匯款</option>
        <option value="paid">已確認匯款</option>
        <option value="shipped">已出貨</option>
      </select>
      <select class="filter-select" id="f-delivery" onchange="renderTable()">
        <option value="">宅配＋面交</option>
        <option value="宅配">宅配</option>
        <option value="面交">面交</option>
      </select>
      <select class="filter-select" id="f-date" onchange="renderTable()">
        <option value="">全部日期</option>
      </select>
      <input class="filter-input" id="f-search" placeholder="搜尋姓名 / 電話 / 末五碼" oninput="renderTable()" style="min-width:190px;">
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>編號</th><th>姓名</th><th>電話</th><th>Email</th><th>收貨日期</th><th>品項</th>
          <th>配送</th><th>地址</th><th>末五碼</th><th>金額</th><th>備註</th><th>狀態</th><th>操作</th>
        </tr></thead>
        <tbody id="order-tbody"></tbody>
      </table>
      <div class="no-results" id="no-results" style="display:none">沒有符合的訂單</div>
    </div>
  </div>

  <!-- TAB 2 每日出貨 -->
  <div class="tab-panel" id="tab-daily">
    <div class="filters">
      <span class="filter-label">日期：</span>
      <select class="filter-select" id="dd-date" onchange="renderDaily()"><option value="">全部日期</option></select>
      <select class="filter-select" id="dd-type" onchange="renderDaily()">
        <option value="">宅配＋面交</option><option value="宅配">🚚 宅配</option><option value="面交">🤝 面交</option>
      </select>
      <select class="filter-select" id="dd-status" onchange="renderDaily()">
        <option value="todo">只看待出貨</option><option value="">全部</option><option value="done">已出貨</option>
      </select>
    </div>
    <div id="daily-content"></div>
  </div>

  <!-- TAB 3 排程 -->
  <div class="tab-panel" id="tab-schedule">
    <div class="schedule-wrap" id="sch-content"></div>
  </div>

  <div class="tab-panel" id="tab-inventory">
    <div style="max-width:600px;margin:0 auto;padding:24px 0">
      <div style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:6px">庫存設定</div>
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:24px">設定每天各口味的最大接單數量，即時同步到訂購頁</div>

      <div style="background:var(--paper-dark);border-radius:4px;padding:20px;margin-bottom:16px">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px">每日上限設定</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;align-items:end">
          <div>
            <label class="form-label" style="color:var(--caramel)">原味上限（盒）</label>
            <input class="form-ctrl" id="inv-default-orig" type="number" min="0" max="99" value="3" oninput="updateTotalPreview()">
          </div>
          <div>
            <label class="form-label" style="color:var(--matcha)">抹茶上限（盒）</label>
            <input class="form-ctrl" id="inv-default-matcha" type="number" min="0" max="99" value="3" oninput="updateTotalPreview()">
          </div>
          <div>
            <label class="form-label" style="color:var(--cocoa)">可可上限（盒）</label>
            <input class="form-ctrl" id="inv-default-cocoa" type="number" min="0" max="99" value="3" oninput="updateTotalPreview()">
          </div>
          <div>
            <label class="form-label" style="color:var(--blue)">每日總上限（盒）</label>
            <input class="form-ctrl" id="inv-default-total" type="number" min="0" max="99" value="9">
          </div>
        </div>
        <div id="inv-preview" style="margin-top:10px;font-size:12px;color:var(--ink-soft)">各口味加總 = 9 盒</div>
        <button class="btn-save" style="margin-top:14px;width:100%" onclick="saveDefaultInv()">儲存設定</button>
      </div>

      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px">儲存後訂購頁會立即更新。超過任一口味上限或每日總上限，顧客無法選擇該日期</div>
    </div>
  </div>

<!-- NEW MODAL -->
<div class="modal-overlay" id="new-modal" onclick="if(event.target===this)closeNewModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">＋ 新增訂單</div>
      <button class="modal-close" onclick="closeNewModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">姓名 *</label><input class="form-ctrl" id="n-name" placeholder="顧客姓名"></div>
        <div class="form-group"><label class="form-label">電話</label><input class="form-ctrl" id="n-phone" placeholder="選填"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">收貨日期 *</label><input class="form-ctrl" id="n-date" type="date"></div>
        <div class="form-group"><label class="form-label">配送方式</label>
          <select class="form-ctrl" id="n-delivery" onchange="nrecalc()"><option value="宅配">宅配</option><option value="面交">面交</option></select>
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label class="form-label">品項數量（盒）</label>
          <div class="flavor-inputs">
            <div class="fi-group"><label class="form-label" style="color:var(--caramel)">原味</label><input class="form-ctrl" id="n-orig" type="number" min="0" value="0" oninput="nrecalc()"></div>
            <div class="fi-group"><label class="form-label" style="color:var(--matcha)">抹茶</label><input class="form-ctrl" id="n-matcha" type="number" min="0" value="0" oninput="nrecalc()"></div>
            <div class="fi-group"><label class="form-label" style="color:var(--cocoa)">可可</label><input class="form-ctrl" id="n-cocoa" type="number" min="0" value="0" oninput="nrecalc()"></div>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">地址</label><input class="form-ctrl" id="n-addr" placeholder="宅配必填"></div>
        <div class="form-group"><label class="form-label">金額（自動）</label><input class="form-ctrl" id="n-total" readonly style="background:var(--paper-dark)"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">匯款末五碼</label><input class="form-ctrl" id="n-code" placeholder="選填"></div>
        <div class="form-group"><label class="form-label">狀態</label>
          <select class="form-ctrl" id="n-status">
            <option value="pending">待確認匯款</option>
            <option value="paid">已確認匯款</option>
            <option value="shipped">已出貨</option>
          </select>
        </div>

async function printOBT(orderId) {
  const o = orders.find(x => x.id === orderId);
  if (!o || o.delivery !== '宅配') return;

  // 從地址開頭抓郵遞區號（如 "105台北市..."）
  const m = o.address.match(/^(\d{3,5})/);
  let zip = m ? m[1].slice(0,3) : '';
  let addr = m ? o.address.slice(m[1].length).trim() : o.address;
  if (!zip) {
    zip = prompt(`請輸入「${o.name}」的郵遞區號\n地址：${o.address}`);
    if (!zip) return;
  }

  const payload = {
    CustomerId: TCAT.customerId, CustomerToken: TCAT.token,
    PrintType: 'A4二模宅配', PrintOBTType: '0',
    Orders: [{ OrderId: o.id, OBTNumber: '',
      SenderName: TCAT.sender.name, SenderTel: TCAT.sender.tel, SenderMobile: TCAT.sender.mobile,
      SenderZipCode: TCAT.sender.zip, SenderAddress: TCAT.sender.address,
      ReceiverName: o.name,
      ReceiverTel: (o.phone && o.phone !== '未填') ? o.phone : TCAT.sender.mobile,
      ReceiverMobile: (o.phone && o.phone !== '未填') ? o.phone : TCAT.sender.mobile,
      ReceiverZipCode: zip, ReceiverAddress: addr,
      GoodsName: '布丁', GoodsNum: '1', Temperature: '0002', Spec: '0001', ServiceType: '02'
    }]
  };

  showToast('⏳ 建立托運單中...');
  try {
    const res = await fetch(TCAT.endpoint + '/PrintOBT', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    const json = await res.json();
    if (json.IsOK !== 'Y') { alert('建立失敗：' + json.Message); return; }
    const row = json.Data[0];
    const obt = row.OBTNumber;
    await db.ref('orders/' + orderId).update({ obtNumber: obt, obtTs: new Date().toISOString() });
    showToast('✅ 托運單 ' + obt);
    const pdfUrl = row.PDFUrl || row.PrintURL || row.DownloadURL;
    if (pdfUrl) window.open(pdfUrl, '_blank');
  } catch(e) { alert('API 連線錯誤：' + e.message); }
}

async function queryOBT(obt) {
  try {
    const res = await fetch(TCAT.endpoint + '/QueryOBT', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ CustomerId: TCAT.customerId, CustomerToken: TCAT.token, OBTNumbers: [obt] })
    });
    const json = await res.json();
    if (json.IsOK === 'Y' && json.Data?.[0]) {
      const d = json.Data[0];
      alert(`📦 ${obt}\n狀態：${d.StatusName || d.Status}\n時間：${d.UpdateTime || ''}`);
    } else { alert('查詢失敗：' + json.Message); }
  } catch(e) { alert('API 錯誤：' + e.message); }
}

// 啟動 Firebase 即時監聽
function startFirebaseListener(){
  db.ref('settings/maxPerDay').on('value', snap => {
    if(snap.val()) maxPerDay = snap.val();
    renderTable();
  });
  db.ref('orders').on('value', snap => {
    orders = [];
    snap.forEach(child => { orders.push(child.val()); });
    orders.sort((a,b)=>(a.ts||'').localeCompare(b.ts||''));
    renderStats(); renderTable(); renderDaily(); renderSchedule();
  });
}

// ── table ──
function renderTable(){
  const fs=document.getElementById('f-status').value,fd=document.getElementById('f-delivery').value,
        fdt=document.getElementById('f-date').value,fq=document.getElementById('f-search').value.toLowerCase();
  const list=orders.filter(o=>{
    if(fs&&o.status!==fs)return false;
    if(fd&&o.delivery!==fd)return false;
    if(fdt&&o.date!==fdt)return false;
    if(fq&&![o.name,o.phone,o.code].some(v=>v&&v.toLowerCase().includes(fq)))return false;
    return true;
  });

  // 計算每天每口味累計（按時間戳排序，超過上限的標出來）
  const dayCount = {}; // date_flavor → 累計盒數
  const overLimit = new Set(); // 超過上限的訂單 id
  const maxO = maxPerDay?.orig   ?? 3;
  const maxM = maxPerDay?.matcha ?? 3;
  const maxC = maxPerDay?.cocoa  ?? 3;
  const maxT = maxPerDay?.total  ?? 9;
  [...orders].sort((a,b)=>(a.ts||'').localeCompare(b.ts||'')).forEach(o => {
    if(!o.date || o.status === 'cancelled') return;
    const k = o.date;
    dayCount[k] = dayCount[k] || {orig:0,matcha:0,cocoa:0};
    let over = false;
    if(o.orig){
      dayCount[k].orig += o.orig;
      if(dayCount[k].orig > maxO) over = true;
    }
    if(o.matcha){
      dayCount[k].matcha += o.matcha;
      if(dayCount[k].matcha > maxM) over = true;
    }
    if(o.cocoa){
      dayCount[k].cocoa += o.cocoa;
      if(dayCount[k].cocoa > maxC) over = true;
    }
    const dayTotal = dayCount[k].orig + dayCount[k].matcha + dayCount[k].cocoa;
    if(dayTotal > maxT) over = true;
    if(over) overLimit.add(o.id);
  });

  document.getElementById('no-results').style.display=list.length?'none':'block';
  document.getElementById('order-tbody').innerHTML=list.map(o=>{
    const isOver = overLimit.has(o.id);
    const dbadge=o.delivery==='面交'?'<span class="badge badge-pickup">🤝面交</span>':'<span class="badge badge-delivery">🚚宅配</span>';
    const warn=o.note&&o.note.startsWith('⚠️')?'<span style="color:var(--red);font-size:10px;margin-left:3px">⚠️</span>':'';
    const overWarn = isOver ? '<div style="font-size:10px;color:var(--red);font-weight:600">⚠️ 超過當日上限</div>' : '';
    return`<tr class="${o.status==='shipped'?'done-row':''}${isOver?' style="background:rgba(180,60,60,.06)"':''}">
      <td style="font-size:10px;color:var(--ink-soft)">${o.id}</td>
      <td><strong>${o.name}</strong>${warn}${overWarn}</td>
      <td>${o.phone}</td>
      <td style="font-size:10px;color:var(--ink-soft)">${o.email||'<span style="color:var(--red)">未填</span>'}</td>
      <td style="white-space:nowrap">${o.date||'<span style="color:var(--red);font-size:10px">未填</span>'}<br><span style="font-size:10px;color:var(--ink-soft)">${o.time}</span></td>
      <td>${fhtml(o)}</td>
      <td>${dbadge}</td>
      <td class="addr-cell">${o.address}</td>
      <td style="font-family:monospace">${o.code}</td>
      <td style="color:var(--caramel);font-weight:500;white-space:nowrap">NT$${o.total.toLocaleString()}</td>
      <td class="note-cell">${o.note||'—'}</td>
      <td>${SB[o.status]}</td>
      <td><div class="action-btns">
        <button class="act-btn edit" onclick="openEdit('${o.id}')">✏️ 編輯</button>
        ${o.status==='pending'?`<button class="act-btn paid" onclick="setS('${o.id}','paid')">✓ 確認</button>`:''}
        ${o.status==='paid'?`<button class="act-btn ship" onclick="setS('${o.id}','shipped')">📦 出貨</button>`:''}
        ${o.status!=='pending'?`<button class="act-btn reset" onclick="setS('${o.id}','pending')">↩</button>`:''}
        <button class="act-btn" onclick="sendShipNotify('${o.id}')" style="border-color:var(--blue);color:var(--blue)" title="發出貨通知">✉️</button>
        <button class="act-btn del" onclick="delOrder('${o.id}','${o.name}')">🗑</button>
      </div></td>
    </tr>`;
  }).join('');
}

  db.ref('orders/'+id).remove();

  db.ref('orders/'+id).update({made: !currentDone});
  showToast(!currentDone ? '✅ 已標記製作完成' : '↩ 取消製作完成');
}

function sendShipNotify(id){
  const o = orders.find(x => x.id === id);
  if(!o){ showToast('找不到訂單'); return; }
  if(!o.email || o.email === '未填' || !o.email.includes('@')){
    showToast('⚠️ 此訂單沒有 email，無法寄信');
    return;
  }
  const items = [o.orig?`原味×${o.orig}盒`:'', o.matcha?`抹茶×${o.matcha}盒`:'', o.cocoa?`可可×${o.cocoa}盒`:''].filter(Boolean).join('、');
  const ws = ['日','一','二','三','四','五','六'];
  const dateDisplay = o.date ? (() => { const d=new Date(o.date); return `${d.getMonth()+1}/${d.getDate()}（週${ws[d.getDay()]}）`; })() : '明日';
  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_SHIP, {
    customer_name:  o.name,
    order_num:      o.id,
    flavor_lines:   items,
    shipping_fee:   (o.total - (o.orig||0)*360 - (o.matcha||0)*390 - (o.cocoa||0)*390) > 0 ? 'NT$160' : 'NT$0（免運）',
    total_amount:   `NT$${o.total}`,
    delivery_mode:  '🚚 宅配到府',
    delivery_date:  dateDisplay,
    address:        o.address || '',
    transfer_date:  o.transferDate || '—',
    transfer_code:  o.code || '—',
    to_email:       o.email,
  }).then(()=>{
    showToast(`✉️ 出貨通知已寄給 ${o.name}`);
  }).catch((err)=>{
    console.error('EmailJS error:', err);
    showToast('⚠️ 寄信失敗，請確認 EmailJS 設定');
  });
}

function togglePacked(id, currentPacked){
  const newPacked = !currentPacked;
  db.ref('orders/'+id).update({packed: newPacked});
  if(newPacked){
    sendShipNotify(id);
  } else {
    showToast('↩ 取消打包');
  }
}

        </div>

// ── schedule ──
function renderSchedule(){
  const MAX = 36;

  // 從訂單動態建立排程
  // 邏輯：客戶收到日(date) → 出貨日(date-1) → 製作日(date-2)
  // 面交：直接在 date 當天面交，不需要出貨日/製作日

  const makeMap = {};  // 製作日 → {orig, matcha, cocoa, shipNote}
  const shipMap = {};  // 出貨日 → [顧客名稱+地址]
  const meetMap = {};  // 面交日 → [{name, address, note}]

  function addDays(dateStr, n){
    if(!dateStr) return null;
    const d = new Date(dateStr);
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0,10);
  }
  function fmt(dateStr){
    if(!dateStr) return '';
    const d = new Date(dateStr);
    const days = ['(日)','(一)','(二)','(三)','(四)','(五)','(六)'];
    return `${d.getMonth()+1}/${d.getDate()} ${days[d.getDay()]}`;
  }

  // 只算未取消的訂單
  const active = orders.filter(o => o.status !== 'cancelled' && o.date);

  active.forEach(o => {
    const receiveDate = o.date;
    const isPickup = o.delivery === '面交';

    if(isPickup){
      // 面交：當天面交，前一天晚上製作
      if(!meetMap[receiveDate]) meetMap[receiveDate] = [];
      meetMap[receiveDate].push({
        id: o.id,
        name: o.name,
        address: o.address || '凱旋國小',
        note: o.note || '',
        status: o.status,
        orig:   o.orig   || 0,
        matcha: o.matcha || 0,
        cocoa:  o.cocoa  || 0,
      });
      // 製作日 = 面交日前一天
      const makeDate = addDays(receiveDate, -1);
      if(makeDate){
        if(!makeMap[makeDate]) makeMap[makeDate] = {orig:0, matcha:0, cocoa:0};
        makeMap[makeDate].orig   += o.orig   || 0;
        makeMap[makeDate].matcha += o.matcha || 0;
        makeMap[makeDate].cocoa  += o.cocoa  || 0;
      }
    } else {
      // 宅配：出貨日 = receiveDate-1，製作日 = receiveDate-2
      const shipDate = addDays(receiveDate, -1);
      const makeDate = addDays(receiveDate, -2);

      if(shipDate){
        if(!shipMap[shipDate]) shipMap[shipDate] = [];
        shipMap[shipDate].push({
          id: o.id,
          name: o.name,
          address: o.address || '',
          note: o.note || '',
          orig:   o.orig   || 0,
          matcha: o.matcha || 0,
          cocoa:  o.cocoa  || 0,
          status: o.status,
          packed: o.packed || false,
          receiveDate,
        });
      }
      if(makeDate){
        if(!makeMap[makeDate]) makeMap[makeDate] = {orig:0, matcha:0, cocoa:0};
        makeMap[makeDate].orig   += o.orig   || 0;
        makeMap[makeDate].matcha += o.matcha || 0;
        makeMap[makeDate].cocoa  += o.cocoa  || 0;
      }
    }
  });

  // 合併所有日期
  const today = new Date().toISOString().slice(0,10);
  const allDates = [...new Set([
    ...Object.keys(makeMap),
    ...Object.keys(shipMap),
    ...Object.keys(meetMap),
  ])].sort((a,b) => {
    const aPast = a < today, bPast = b < today;
    if(aPast !== bPast) return aPast ? 1 : -1; // 過去的排後面
    return a.localeCompare(b);
  });

  if(!allDates.length){
    document.getElementById('sch-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink-soft)">目前沒有訂單</div>';
    return;
  }

  document.getElementById('sch-content').innerHTML = allDates.map(date => {
    const make = makeMap[date];
    const ships = shipMap[date] || [];
    const meets = meetMap[date] || [];

    const tags = [];
    if(make) tags.push('<span class="stag stag-make">🔥製作</span>');
    if(ships.length) tags.push('<span class="stag stag-ship">📦出貨</span>');
    if(meets.length) tags.push('<span class="stag stag-meet">🤝面交</span>');

    // 判斷這天的標籤說明
    const labels = [];
    if(make) labels.push(`製作（供明天出貨）`);
    if(ships.length) labels.push(`出貨 ${ships.length} 筆`);
    if(meets.length) labels.push(`面交 ${meets.length} 筆`);
    const label = labels.join('・');

    // 生產區 - 對應訂單明細（含 checkbox）
    const makeOrderRows = make ? active
      .filter(o => {
        if(o.delivery === '面交') return addDays(o.date, -1) === date;
        return addDays(o.date, -2) === date;
      })
      .map(o => {
        const items = [];
        if(o.orig)   items.push(`原×${o.orig}`);
        if(o.matcha) items.push(`抹×${o.matcha}`);
        if(o.cocoa)  items.push(`可×${o.cocoa}`);
        const done = o.made === true;
        return `<li style="font-size:11px;padding:6px 0;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:8px;cursor:pointer;${done?'opacity:.45;text-decoration:line-through':''}" onclick="toggleMade('${o.id}',${done})">
          <span style="font-size:16px;flex-shrink:0">${done ? '✅' : '⬜'}</span>
          <span style="font-weight:500;flex:1">${o.name}</span>
          <span style="color:var(--caramel);font-family:monospace;letter-spacing:.5px">${items.join(' ')}</span>
        </li>`;
      }).join('') : '';

    const doneCount = make ? active.filter(o => {
      const mDate = o.delivery==='面交' ? addDays(o.date,-1) : addDays(o.date,-2);
      return mDate === date && o.made;
    }).length : 0;
    const totalCount = make ? active.filter(o => {
      const mDate = o.delivery==='面交' ? addDays(o.date,-1) : addDays(o.date,-2);
      return mDate === date;
    }).length : 0;

    const prodHtml = make ? `<div>
      <h4>今晚製作・供明日出貨 ${totalCount>0?`<span style="font-size:11px;font-weight:400;color:${doneCount===totalCount?'var(--matcha)':'var(--ink-soft)'}">${doneCount}／${totalCount} 完成</span>`:''}</h4>
      ${(()=>{const t=make.orig+make.matcha+make.cocoa,mt=maxPerDay.total??9,over=t>mt;return`<div style="font-size:12px;margin-bottom:8px;padding:4px 8px;border-radius:3px;background:${over?'rgba(180,60,60,.08)':'rgba(0,0,0,.03)'};color:${over?'var(--red)':'var(--ink-soft)'}">合計 <strong>${t}／${mt} 盒</strong>${over?` ⚠️ 超過每日總上限 +${t-mt} 盒`:''}</div>`;})()}
      ${make.orig?(()=>{const o=make.orig,m=maxPerDay.orig,pct=Math.min(Math.round(o/m*100),100),over=o>m;return`<div class="prod-row"><span class="prod-label">原味</span><div class="prod-bar"><div class="prod-fill pf-orig" style="width:${pct}%;${over?'background:var(--red)':''}"></div></div><span class="prod-num" style="${over?'color:var(--red);font-weight:600':''}">${o}／${m}盒${over?` ⚠️+${o-m}`:''}</span></div>`;})():''}
      ${make.matcha?(()=>{const o=make.matcha,m=maxPerDay.matcha,pct=Math.min(Math.round(o/m*100),100),over=o>m;return`<div class="prod-row"><span class="prod-label">抹茶</span><div class="prod-bar"><div class="prod-fill pf-matcha" style="width:${pct}%;${over?'background:var(--red)':''}"></div></div><span class="prod-num" style="${over?'color:var(--red);font-weight:600':''}">${o}／${m}盒${over?` ⚠️+${o-m}`:''}</span></div>`;})():''}
      ${make.cocoa?(()=>{const o=make.cocoa,m=maxPerDay.cocoa,pct=Math.min(Math.round(o/m*100),100),over=o>m;return`<div class="prod-row"><span class="prod-label">可可</span><div class="prod-bar"><div class="prod-fill pf-cocoa" style="width:${pct}%;${over?'background:var(--red)':''}"></div></div><span class="prod-num" style="${over?'color:var(--red);font-weight:600':''}">${o}／${m}盒${over?` ⚠️+${o-m}`:''}</span></div>`;})():''}
      ${makeOrderRows ? `<ul style="margin:12px 0 0;padding:0;list-style:none">
        <li style="font-size:10px;color:var(--ink-soft);margin-bottom:4px;letter-spacing:.5px">點擊打勾確認製作完成</li>
        ${makeOrderRows}
      </ul>` : ''}
    </div>` : `<div><h4>生產</h4><div style="font-size:12px;color:var(--ink-soft);padding:6px 0">今天不需製作</div></div>`;

    // 面交區
    const mHtml = meets.length
      ? `<ul class="sch-list">${meets.map(m=>`<li>
          <span class="pill pill-meet">面交</span>
          <div>
            <div style="font-weight:500">${m.name} ${m.status==='shipped'?'✅':''}</div>
            <div style="font-size:10px;color:var(--caramel)">${[m.orig?`原×${m.orig}`:'',m.matcha?`抹×${m.matcha}`:'',m.cocoa?`可×${m.cocoa}`:''].filter(Boolean).join(' ')}</div>
            <div style="font-size:10px;color:var(--ink-soft)">${m.address}${m.note?' ・'+m.note:''}</div>
          </div>
        </li>`).join('')}</ul>`
      : `<div style="font-size:12px;color:var(--ink-soft)">—</div>`;

    // 出貨區（含打包 checkbox）
    const shipDoneCount = ships.filter(s => s.packed).length;
    const sundayWarn = ships.length && new Date(date).getDay() === 0
      ? `<div style="font-size:11px;color:var(--red);background:rgba(180,60,60,.08);padding:6px 10px;border-radius:3px;margin-bottom:8px">⚠️ 今天是週日，黑貓不收件！請改前一天（週六）出貨。</div>`
      : '';
    const sHtml = ships.length
      ? `<div style="margin-bottom:6px;font-size:10px;color:${shipDoneCount===ships.length?'var(--matcha)':'var(--ink-soft)'};letter-spacing:.5px">
          點擊確認打包完成・${shipDoneCount}／${ships.length} 已打包
        </div>
        <ul class="sch-list">${ships.map(s=>`<li style="cursor:pointer;${s.packed?'opacity:.45;text-decoration:line-through':''}" onclick="togglePacked('${s.id}',${!!s.packed})">
          <span style="font-size:16px;flex-shrink:0">${s.packed?'✅':'⬜'}</span>
          <div style="flex:1">
            <div style="font-weight:500">${s.name}</div>
            <div style="font-size:10px;color:var(--ink-soft)">${s.address}</div>
            <div style="font-size:10px;color:var(--caramel)">
              ${[s.orig?`原×${s.orig}`:'', s.matcha?`抹×${s.matcha}`:'', s.cocoa?`可×${s.cocoa}`:''].filter(Boolean).join(' ')}
              &nbsp;→ 客戶 ${fmt(s.receiveDate)} 收到
            </div>
            ${s.note?`<div style="font-size:10px;color:var(--ink-soft)">備註：${s.note}</div>`:''}
          </div>
        </li>`).join('')}</ul>`
      : `<div style="font-size:12px;color:var(--ink-soft)">—</div>`;

    const isPast = date < today;
    return `<div class="sch-day" ${isPast?'style="opacity:.5"':''}>
      <div class="sch-hdr" onclick="var b=this.nextElementSibling;b.style.display=b.style.display==='none'?'grid':'none'">
        <div class="sch-title">${fmt(date)}</div>
        <div style="font-size:12px;color:var(--ink-soft)">${isPast?'<span style="color:var(--ink-soft)">已完成</span> · ':''} ${label}</div>
        <div style="display:flex;gap:6px">${tags.join('')}</div>
      </div>
      <div class="sch-body">
        ${prodHtml}
        <div>
          <h4>面交安排</h4>${mHtml}
          <h4 style="margin-top:12px">宅配出貨</h4>${sundayWarn}${sHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;void t.offsetWidth;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
</script>
</body>
</html>
