<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page 生成器｜許藍方</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#FBF7F2;--bg2:#F4EDE0;--ink:#2A1A0A;--ink-mid:#5C3D1E;--terracotta:#B85C38;--gold:#B8873A;--muted:#9C7A55;--faint:#C4A882;--border:#E2D4C0;--green:#5A8A6A}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Noto Serif TC',serif;font-weight:300;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:0 24px 80px}
header{padding:36px 0 24px;border-bottom:1px solid var(--border);margin-bottom:32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--muted)}
.header-tag{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint)}
h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(24px,5vw,36px);color:var(--ink);margin-bottom:8px;line-height:1.3}
h1 em{font-style:italic;color:var(--terracotta)}
.page-sub{font-size:13px;color:var(--muted);line-height:1.85;margin-bottom:28px}
.mode-tabs{display:flex;margin-bottom:28px;border:1.5px solid var(--border);overflow:hidden}
.mode-tab{flex:1;padding:13px 16px;text-align:center;font-size:13px;cursor:pointer;transition:all .25s;background:white;color:var(--muted);border:none;font-family:'Noto Serif TC',serif;letter-spacing:.04em}
.mode-tab:first-child{border-right:1px solid var(--border)}
.mode-tab.active{background:var(--ink);color:white}
.mode-panel{display:none}
.mode-panel.active{display:block}
.section{margin-bottom:24px}
.section-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:block}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);background:white;font-family:'Noto Serif TC',serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s;resize:vertical}
.field input:focus,.field textarea:focus{border-color:var(--terracotta)}
.field input::placeholder,.field textarea::placeholder{color:var(--faint)}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.get-row{display:grid;grid-template-columns:48px 1fr 2fr;gap:8px;margin-bottom:8px;align-items:start}
.generate-btn{width:100%;padding:16px;background:var(--ink);color:white;border:none;font-family:'Noto Serif TC',serif;font-size:14px;letter-spacing:.06em;cursor:pointer;transition:background .3s;margin-top:4px}
.generate-btn:hover:not(:disabled){background:var(--terracotta)}
.generate-btn:disabled{opacity:.55;cursor:not-allowed}
.results{display:none;margin-top:32px}
.results.visible{display:block;animation:fadeUp .4s ease}
.result-card{background:white;border:1px solid var(--border);margin-bottom:14px;position:relative;box-shadow:0 1px 10px rgba(90,50,20,.05)}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--terracotta),var(--gold))}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--border)}
.card-title{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.copy-btn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:4px 10px;cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .2s}
.copy-btn:hover{border-color:var(--terracotta);color:var(--terracotta)}
.copy-btn.copied{border-color:var(--green);color:var(--green)}
.card-body{padding:16px}
.frr{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.frr:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.fkey{font-size:11px;letter-spacing:.1em;color:var(--faint);margin-bottom:5px;text-transform:uppercase}
.fval{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--ink);line-height:1.6}
.otext{font-size:13px;line-height:1.9;color:var(--ink-mid);white-space:pre-wrap;word-break:break-word}
/* CTA 特別樣式：把連結佔位符高亮 */
.cta-link-placeholder{display:inline-block;background:var(--bg2);border:1px dashed var(--terracotta);color:var(--terracotta);padding:1px 6px;font-size:12px;letter-spacing:.04em;border-radius:2px}
.cta-hint{font-size:11px;color:var(--faint);margin-top:10px;padding:8px 12px;border-left:2px solid var(--border);line-height:1.7}
.download-btn{width:100%;padding:15px;background:var(--terracotta);color:white;border:none;font-family:'Noto Serif TC',serif;font-size:14px;letter-spacing:.06em;cursor:pointer;transition:background .3s;margin-top:6px}
.download-btn:hover{background:var(--ink)}
.loading::after{content:'';animation:dots 1.2s infinite}
@keyframes dots{0%{content:''}33%{content:'．'}66%{content:'．．'}100%{content:'．．．'}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:500px){.field-row{flex-direction:column}.get-row{grid-template-columns:40px 1fr}.get-row .field:last-child{grid-column:1/-1}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo">許藍方・內容工具箱</div>
  <div class="header-tag">Landing Page 生成器</div>
</header>
<h1>一鍵生成<br><em>Landing Page</em></h1>
<p class="page-sub">貼文章讓 AI 自動分析，或直接手動填空——兩種模式，產出完整 HTML 直接上傳用。</p>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="switchMode('ai')">🤖 AI 自動分析</button>
  <button class="mode-tab" onclick="switchMode('manual')">✏️ 手動填空</button>
</div>

<!-- AI 模式 -->
<div class="mode-panel active" id="panel-ai">
  <div class="section">
    <span class="section-label">設定</span>
    <div class="field-row">
      <div class="field"><label>引流品名稱</label><input type="text" id="ai-lead" placeholder="例如：約會溺水對照表"></div>
      <div class="field"><label>Kit 表單 ID</label><input type="text" id="ai-kit" placeholder="例如：9141329"></div>
    </div>
    <div class="field"><label>Anthropic API Key（只存在瀏覽器，不會外傳）</label><input type="password" id="ai-key" placeholder="sk-ant-..."></div>
  </div>
  <div class="section">
    <span class="section-label">貼入文章</span>
    <div class="field"><textarea id="ai-article" style="min-height:180px" placeholder="把你的文章全文貼在這裡⋯⋯"></textarea></div>
  </div>
  <button class="generate-btn" id="ai-btn" onclick="runAI()">開始分析並生成文案</button>
</div>

<!-- 手動模式 -->
<div class="mode-panel" id="panel-manual">
  <div class="section">
    <span class="section-label">基本設定</span>
    <div class="field-row">
      <div class="field"><label>你的名字</label><input type="text" id="m-name" value="許藍方"></div>
      <div class="field"><label>Kit 表單 ID</label><input type="text" id="m-kit" placeholder="例如：9141329"></div>
    </div>
    <div class="field"><label>身份</label><input type="text" id="m-title" value="希塔療癒導師・關係靈氣療癒師"></div>
  </div>
  <div class="section">
    <span class="section-label">頁面文案</span>
    <div class="field-row">
      <div class="field"><label>主標題第一行</label><input type="text" id="m-t1" placeholder="例如：你在關係裡"></div>
      <div class="field"><label>斜體第二行（紅色）</label><input type="text" id="m-t2" placeholder="例如：溺水了嗎？"></div>
    </div>
    <div class="field"><label>副標題</label><input type="text" id="m-sub" placeholder="例如：12 題對照表，幫你看清楚你在關係裡的位置"></div>
    <div class="field"><label>金句</label><textarea id="m-quote" style="min-height:70px" placeholder="引用文章裡最打動人的一句話"></textarea></div>
    <div class="field"><label>金句來源說明</label><input type="text" id="m-cite" placeholder="例如：約會溺水風險對照表"></div>
  </div>
  <div class="section">
    <span class="section-label">你會收到（三項）</span>
    <div class="get-row">
      <div class="field"><label>圖示</label><input type="text" id="g1i" placeholder="💗"></div>
      <div class="field"><label>名稱</label><input type="text" id="g1n" placeholder="項目一名稱"></div>
      <div class="field"><label>說明</label><input type="text" id="g1d" placeholder="一句說明"></div>
    </div>
    <div class="get-row">
      <div class="field"><label>圖示</label><input type="text" id="g2i" placeholder="🧭"></div>
      <div class="field"><label>名稱</label><input type="text" id="g2n" placeholder="項目二名稱"></div>
      <div class="field"><label>說明</label><input type="text" id="g2d" placeholder="一句說明"></div>
    </div>
    <div class="get-row">
      <div class="field"><label>圖示</label><input type="text" id="g3i" placeholder="📩"></div>
      <div class="field"><label>名稱</label><input type="text" id="g3n" placeholder="項目三名稱"></div>
      <div class="field"><label>說明</label><input type="text" id="g3d" placeholder="一句說明"></div>
    </div>
  </div>
  <div class="section">
    <span class="section-label">表單</span>
    <div class="field-row">
      <div class="field"><label>表單標題</label><input type="text" id="m-ftitle" placeholder="免費領取對照表"></div>
      <div class="field"><label>按鈕文字</label><input type="text" id="m-btn" placeholder="我不想再溺水了 →"></div>
    </div>
  </div>
  <button class="generate-btn" onclick="runManual()">生成 Landing Page HTML</button>
</div>

<!-- 結果 -->
<div class="results" id="results">
  <div class="result-card" id="card-landing" style="display:none">
    <div class="card-header"><div class="card-title">Landing Page 文案</div><button class="copy-btn" onclick="copyEl('landing-text',this)">複製</button></div>
    <div class="card-body" id="landing-text"></div>
  </div>
  <div class="result-card" id="card-cta" style="display:none">
    <div class="card-header"><div class="card-title">文章結尾 CTA</div><button class="copy-btn" onclick="copyEl('cta-text',this)">複製</button></div>
    <div class="card-body">
      <div class="otext" id="cta-text"></div>
      <div class="cta-hint">👆 把 <span style="color:var(--terracotta);font-weight:400">[連結]</span> 換成你的 Landing Page 網址後，直接貼到文章結尾。</div>
    </div>
  </div>
  <div class="result-card" id="card-email" style="display:none">
    <div class="card-header"><div class="card-title">Kit 歡迎信文案</div><button class="copy-btn" onclick="copyEmail(this)">複製</button></div>
    <div class="card-body">
      <div class="frr"><div class="fkey">主旨</div><div class="fval" id="email-subject"></div></div>
      <div class="frr"><div class="fkey">正文</div><div class="otext" id="email-body"></div></div>
    </div>
  </div>
  <button class="download-btn" id="dl-btn" style="display:none" onclick="downloadHTML()">→ 下載完整 Landing Page HTML</button>
</div>
</div>

<script>
let pageData=null;

window.addEventListener('load', () => {
  const saved = localStorage.getItem('anthropic_key');
  if (saved) document.getElementById('ai-key').value = saved;
});

function switchMode(m){
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',(m==='ai'&&i===0)||(m==='manual'&&i===1)));
  document.getElementById('panel-ai').classList.toggle('active',m==='ai');
  document.getElementById('panel-manual').classList.toggle('active',m==='manual');
}

async function runAI(){
  const article=document.getElementById('ai-article').value.trim();
  const lead=document.getElementById('ai-lead').value.trim()||'免費資源';
  const kitId=document.getElementById('ai-kit').value.trim();
  const apiKey=document.getElementById('ai-key').value.trim();
  if(!article)return alert('請先貼入文章內容');
  if(!apiKey)return alert('請填入 Anthropic API Key');
  localStorage.setItem('anthropic_key', apiKey);
  const btn=document.getElementById('ai-btn');
  btn.innerHTML='<span class="loading">AI 分析中</span>';
  btn.disabled=true;

  const prompt=`你是許藍方的內容助理。許藍方是一位希塔療癒導師和關係靈氣療癒師，文字風格溫暖、直接、有詩意，說話像一個真實的人，不像行銷。

你的任務是根據以下文章，生成「${lead}」的 Landing Page 所有文案。

風格要求：
- 文案要有溫度，像一個懂你的朋友在說話
- 絕對不用「索取」「領取」「獲取」「免費」這些行銷字眼
- 標題要有畫面感，讓人停下來
- 金句直接從文章裡萃取，不要改寫
- 按鈕文字是一個內心的選擇或宣告，不是一個指令

按鈕文字範例（學習這個風格）：
✓ 好的：「我準備好看見自己了 →」「我不想再溺水了 →」「我想知道我在哪裡 →」「帶我去看看 →」
✗ 不好的：「免費索取檢核表 →」「領取修復工具包 →」「立即獲取 →」「確認訂閱 →」

歡迎信範例（學習這個風格）：
✓ 好的開頭：「謝謝你願意停下來看這件事。能點進來的人，通常不是隨便看看——是因為某個地方被說中了。」
✗ 不好的開頭：「感謝您訂閱！您的資源已經準備好了。」

文章內容：
${article}

只回 JSON，不要有其他文字：
{
  "page_title": "頁面標題，有感覺，帶入核心問題或洞見，60字內",
  "og_desc": "社群分享預覽，讓人想點進來，80字內",
  "t1": "主標題第一行，像一句說中心裡的話，8字內",
  "t2": "斜體第二行，延伸或轉折，6字內",
  "sub": "副標題，一句話說清楚這份資源能帶來什麼，20字內",
  "quote": "從文章裡直接萃取最打動人的一句話，不要改寫原文",
  "cite": "這句話出自哪裡的說明",
  "gets": [
    {"icon": "適合的emoji", "name": "簡短名稱", "desc": "一句說明這個項目能幫對方做什麼，25字內"},
    {"icon": "適合的emoji", "name": "簡短名稱", "desc": "25字內"},
    {"icon": "適合的emoji", "name": "簡短名稱", "desc": "25字內"}
  ],
  "form_title": "表單標題，像邀請不像要求，15字內，不要用索取領取獲取",
  "form_note": "一句說明填了之後會收到什麼",
  "btn": "按鈕文字，像一個內心的選擇或宣告，參考上面的好範例，10字內，結尾加 →，絕對不用索取領取獲取免費這些字",
  "success_t1": "成功畫面標題第一部分，簡短",
  "success_em": "斜體強調詞，溫暖",
  "success_body": "成功後說的話，像朋友說的，三行內",
  "cta": "文章結尾引流段落，共三段用換行分隔。\n第一段：2-3句溫暖的話，承接文章最後的情緒，不要突然轉成行銷語氣，讓讀者感覺被理解。\n第二段：一句自然帶出這份資源，然後是連結佔位符 [連結] ，文字像是在說「這裡有個地方可以去看看」。\n第三段：一句提醒，例如：填完之後記得去垃圾郵件找，或把信件標記為重要。\n整體不超過100字，沒有銷售感。",
  "email_subject": "歡迎信主旨，有溫度，帶入 {{ subscriber.first_name }}，不要用感謝訂閱",
  "email_body": "歡迎信正文。以 {{ subscriber.first_name }}，你好 開頭。參考好範例的風格。2-3句說為什麼填這個表示什麼，說這份資源怎麼用，最後邀請對方直接回信說感受。署名藍方。不超過120字。語氣像朋友寫的信，不像電子報。",
  "confirm_btn": "Kit確認信的按鈕文字。背景：讀者填完表單後會收到一封確認信，需要點這個按鈕才算完成訂閱。\n目標：讓讀者看到這個按鈕時，不是感覺「我要完成一個手續」，而是感覺「我想點這個」——像是一個對自己的宣告，或是對某件事的回應。\n要求：呼應這篇文章的核心情緒，10字內，結尾不加「確認」「訂閱」「領取」「索取」這類字眼，可以加 →。\n範例風格：「我準備好了 →」「是的，我想看見 →」「帶我去那裡 →」「我想停在這裡 →」"
}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(!res.ok||data.error)throw new Error(data.error?.message||'API 錯誤 '+res.status);
    const r=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    pageData={...r,kitId,name:'許藍方',title:'希塔療癒導師・關係靈氣療癒師'};

    document.getElementById('landing-text').innerHTML=`
      <div class="frr"><div class="fkey">主標題</div><div class="fval">${r.t1} / <em>${r.t2}</em></div></div>
      <div class="frr"><div class="fkey">副標題</div><div class="fval">${r.sub}</div></div>
      <div class="frr"><div class="fkey">金句</div><div class="fval">「${r.quote}」</div></div>
      <div class="frr"><div class="fkey">賣點</div><div class="fval">${r.gets.map(g=>`${g.icon} ${g.name}：${g.desc}`).join('<br>')}</div></div>
      <div class="frr"><div class="fkey">表單按鈕</div><div class="fval">${r.btn}</div></div>
      <div class="frr"><div class="fkey">Kit 確認信按鈕</div><div class="fval" id="confirm-btn-text">${r.confirm_btn}</div></div>
    `;

    // CTA：把 [連結] 高亮顯示
    const ctaFormatted = r.cta.replace(/\[連結\]/g, '<span class="cta-link-placeholder">[連結]</span>');
    document.getElementById('cta-text').innerHTML = ctaFormatted;

    document.getElementById('email-subject').textContent=r.email_subject;
    document.getElementById('email-body').textContent=r.email_body;
    ['card-landing','card-cta','card-email'].forEach(id=>document.getElementById(id).style.display='block');
    document.getElementById('dl-btn').style.display='block';
    document.getElementById('results').classList.add('visible');
    document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
  }catch(err){alert('生成失敗：'+err.message);console.error(err);}
  btn.innerHTML='重新分析';btn.disabled=false;
}

function runManual(){
  const r={
    t1:document.getElementById('m-t1').value||'主標題',
    t2:document.getElementById('m-t2').value||'副標題',
    sub:document.getElementById('m-sub').value,
    quote:document.getElementById('m-quote').value,
    cite:document.getElementById('m-cite').value,
    gets:[
      {icon:document.getElementById('g1i').value||'💗',name:document.getElementById('g1n').value,desc:document.getElementById('g1d').value},
      {icon:document.getElementById('g2i').value||'🧭',name:document.getElementById('g2n').value,desc:document.getElementById('g2d').value},
      {icon:document.getElementById('g3i').value||'📩',name:document.getElementById('g3n').value,desc:document.getElementById('g3d').value},
    ],
    form_title:document.getElementById('m-ftitle').value||'免費領取',
    form_note:'輸入你的資訊，我馬上寄給你',
    btn:document.getElementById('m-btn').value||'我準備好了 →',
    success_t1:'收到了',success_em:'寄出了',
    success_body:'去信箱找找吧。\n不需要一次全部回答——\n哪一題讓你停下來，就停在那裡。',
    page_title:(document.getElementById('m-t1').value||'')+(document.getElementById('m-t2').value||'')+'｜許藍方',

  };

}

  const a=document.createElement('a');

function copyEl(id,btn){
  // 複製純文字，不含 HTML 標籤
  const el = document.getElementById(id);
  const text = el.innerText || el.textContent;
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='已複製 ✓';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='複製';btn.classList.remove('copied');},2000);
  });
}
function copyEmail(btn){
  const text='主旨：'+document.getElementById('email-subject').textContent+'\n\n'+document.getElementById('email-body').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='已複製 ✓';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='複製';btn.classList.remove('copied');},2000);
  });
}
</script>
